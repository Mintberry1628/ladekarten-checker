name: Umfeld vorberechnen (monatlich, automatisch)

# Rechnet für jeden Ladestandort einmal im Monat aus, was im 700-m-Umkreis liegt
# (Essen, WC, Supermarkt, Spielplatz). Die App lädt danach nur noch eine fertige
# Datei statt bei jedem Stopp Overpass zu fragen — das dauerte 2–40 s pro Standort.
# Quelle: OpenStreetMap-Länderauszüge von Geofabrik (ODbL).

on:
  schedule:
    - cron: "0 5 6 * *"     # am 6. jeden Monats, einen Tag nach dem Säulen-Register
  workflow_dispatch: {}
  push:
    paths:
      - "gen-umfeld.js"      # Änderungen am Generator sofort durchrechnen
      - ".github/workflows/umfeld-update.yml"

permissions:
  contents: write

jobs:
  umfeld:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: osmium installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq osmium-tool

      - name: Länderauszüge holen, filtern und wieder wegwerfen
        run: |
          # Kleine Länder zuerst, Deutschland zuletzt: bricht etwas ab, ist die
          # Werkzeugkette schon an einem 150-MB-Auszug geprüft statt an 4 GB.
          # Jeder Schritt meldet seinen Fehler als GitHub-Annotation (die ist auch
          # ohne Login lesbar) — sonst tappt man bei einem Fehlschlag im Dunkeln.
          lauf() {
            beschreibung="$1"; shift
            if ! "$@" > schritt.log 2>&1; then
              echo "::error::$beschreibung fehlgeschlagen (Code $?): $(tail -c 600 schritt.log | tr '\n' ' ')"
              df -h / | tail -1
              exit 1
            fi
          }
          for land in europe/bosnia-herzegovina europe/slovenia europe/croatia europe/austria europe/germany; do
            name=$(basename $land)
            echo "::group::$name"
            lauf "Download $name" curl -sSLf --retry 3 -o roh.osm.pbf "https://download.geofabrik.de/${land}-latest.osm.pbf"
            ls -lh roh.osm.pbf
            # Die vier Umfeld-Kategorien. -t/--remove-tags nicht nötig, aber die
            # referenzierten Knoten müssen drinbleiben, sonst fehlen den Flächen
            # (Restaurants sind meist Gebäude) später die Koordinaten.
            # Nur Knoten und Wege (nw), keine Relationen: eine Relation und ihre
            # Mitglieds-Wege beschreiben denselben Spielplatz und wurden sonst
            # mehrfach gezählt (Laim: 94 statt 59).
            lauf "Filter POIs $name" osmium tags-filter roh.osm.pbf \
              nw/amenity=restaurant,fast_food,cafe,toilets \
              nw/shop=supermarket,convenience,bakery \
              nw/leisure=playground \
              -o pois-$name.osm.pbf --overwrite
            # Ankerpunkte im Ausland: Ladestationen aus OpenStreetMap
            if [ "$name" != "germany" ]; then
              lauf "Filter Lader $name" osmium tags-filter roh.osm.pbf nwr/amenity=charging_station -o lader-$name.osm.pbf --overwrite
              lauf "Export Lader $name" osmium export lader-$name.osm.pbf -f geojsonseq -o lader-$name.geojsonseq --overwrite
              rm -f lader-$name.osm.pbf
            fi
            # --add-unique-id: schreibt die OSM-Objekt-ID mit. osmium export gibt
            # einen geschlossenen Weg zweimal aus (Linie + Fläche) — mit der ID
            # erkennt der Generator das sicher, statt über Koordinaten zu raten.
            lauf "Export POIs $name" osmium export pois-$name.osm.pbf -f geojsonseq --add-unique-id=type_id -o pois-$name.geojsonseq --overwrite
            rm -f roh.osm.pbf pois-$name.osm.pbf
            wc -l pois-$name.geojsonseq
            df -h / | tail -1
            echo "::endgroup::"
          done
          cat pois-*.geojsonseq > pois-alle.geojsonseq
          rm -f pois-bosnia-herzegovina.geojsonseq pois-slovenia.geojsonseq pois-croatia.geojsonseq pois-austria.geojsonseq pois-germany.geojsonseq
          ls -lh pois-alle.geojsonseq lader-*.geojsonseq

      - name: Umfeld je Ladestandort berechnen
        run: |
          if ! node --max-old-space-size=6144 gen-umfeld.js pois-alle.geojsonseq lader-*.geojsonseq > rechnen.log 2>&1; then
            echo "::error::Berechnung fehlgeschlagen: $(tail -c 600 rechnen.log | tr '\n' ' ')"
            exit 1
          fi
          cat rechnen.log

      - name: Plausibilität prüfen (nie eine kaputte Datei committen)
        run: |
          node -e "
          const d = require('./umfeld-de.json');
          if (!Array.isArray(d.punkte) || d.punkte.length < 12000) throw new Error('Zu wenige Standorte: ' + (d.punkte||[]).length);
          const mit = d.punkte.filter(p => p[2] || p[3] || p[4] || p[5]).length;
          if (mit / d.punkte.length < 0.4) throw new Error('Verdächtig wenige Treffer: ' + Math.round(mit/d.punkte.length*100) + ' %');
          console.log('OK:', d.punkte.length, 'Standorte,', Math.round(mit/d.punkte.length*100), '% mit Treffern,', d.namen.length, 'Namen');
          "

      - name: Änderungen committen
        run: |
          git config user.name "umfeld-bot"
          git config user.email "actions@users.noreply.github.com"
          git add umfeld-de.json
          git diff --cached --quiet && echo "Keine Änderungen" && exit 0
          git commit -m "Umfeld je Ladestandort neu berechnet (Quelle: OpenStreetMap, ODbL)"
          git push
