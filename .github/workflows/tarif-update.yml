name: Tarif-Update (wöchentlich, automatisch)

on:
  schedule:
    - cron: "0 5 * * 1"   # jeden Montag, 05:00 UTC (~06/07 Uhr deutscher Zeit)
  workflow_dispatch: {}    # zusätzlich manuell startbar (Actions-Tab -> Run workflow)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Tarife per Gemini recherchieren und validieren
        run: node automation/update-tarife.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Änderungen committen
        run: |
          git config user.name "tarif-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tarife.json
          git commit -m "Automatisches Tarif-Update $(date +%F)" || echo "Keine Änderungen."
          git push
